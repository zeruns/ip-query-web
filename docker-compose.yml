services:
  ip-query-web:
    build: .
    image: ip-query-web:latest
    container_name: ip-query-web
    restart: unless-stopped
    ports:
      - "6688:6688"
    volumes:
      # IP 数据库文件持久化（更新后不丢失）
      - ./data:/app/data
      # 环境变量配置（部署前需先 cp .env.example .env）
      - ./.env:/app/.env:ro
    environment:
      PORT: "6688"
      HOST: "::"
      TZ: "Asia/Shanghai"
      GITHUB_MIRROR: "https://gh-proxy.com/"
      # 境内部署建议设置国内 DNS，避免解析超时
      # PUBLIC_DNS: "223.5.5.5,119.29.29.29"
