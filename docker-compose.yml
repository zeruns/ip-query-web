version: "3"

services:
  ip-query-web:
    build: .
    image: ip-query-web:latest
    container_name: ip-query-web
    restart: unless-stopped
    ports:
      - "6688:6688"
    volumes:
      # IP 数据库文件持久化（更新后不丢失）
      - ./data:/app/data
      # 环境变量配置（可选）
      - ./.env:/app/.env:ro
    environment:
      # 映射格式（兼容 V1 docker-compose）
      PORT: "6688"
      HOST: "::"
      TZ: "Asia/Shanghai"
      GITHUB_MIRROR: "https://gh-proxy.com/"
    # 更多配置可通过挂载的 .env 文件或在此 environment 中设置
