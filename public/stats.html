<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>网站统计 - IP归属地查询</title>
  <meta name="description" content="IP归属地查询系统网站统计页，查看页面访问量和API调用次数。">
  <meta name="keywords" content="网站统计,PV,API调用统计">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="">
  <meta name="site-url" content="https://ip-query.zeruns.com">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <script src="/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      padding-top: 60px;
      color: #e0e0e0;
    }
    .navbar {
      position: fixed; top:0; left:0; right:0; z-index:100;
      background: rgba(15,12,41,0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 20px; height: 56px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .navbar a { color: rgba(255,255,255,0.5); text-decoration: none; padding: 8px 18px; border-radius: 8px; font-size: 14px; transition: all 0.2s; }
    .navbar a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .navbar a.active { color: #8b7dff; background: rgba(108,99,255,0.12); font-weight: 600; }
    .navbar .brand { color: #8b7dff; font-weight: 700; font-size: 15px; margin-right: 12px; }

    .container { max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; }
    h1 { text-align: center; font-size: 24px; margin-bottom: 6px; background: linear-gradient(90deg, #6c63ff, #b388ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 28px; }

    .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
    .metric-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 22px 18px; text-align: center;
      transition: border-color 0.3s, background 0.3s;
    }
    .metric-card:hover { border-color: rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); }
    .metric-value { font-size: 26px; font-weight: 700; line-height: 1.2; }
    .metric-label { color: rgba(255,255,255,0.35); font-size: 12px; margin-top: 4px; letter-spacing: 1px; }
    .metric-card.pv .metric-value { color: #8b7dff; }
    .metric-card.api .metric-value { color: #00c896; }

    .tab-row { display: flex; gap: 8px; margin-bottom: 24px; justify-content: center; }
    .tab-btn {
      padding: 10px 24px; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
      background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.45); font-size: 14px; cursor: pointer; transition: all 0.25s;
    }
    .tab-btn:hover { color: #fff; border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); }
    .tab-btn.active { color: #8b7dff; border-color: rgba(108,99,255,0.35); background: rgba(108,99,255,0.1); font-weight: 600; }

    .card {
      background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px; padding: 24px; margin-bottom: 20px;
    }
    .card-title { color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 1px; margin-bottom: 16px; }

    .chart-wrap { position: relative; width: 100%; height: 320px; }
    .chart-wrap canvas { width: 100% !important; height: 100% !important; }

    .loading { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); }
    .empty { text-align: center; padding: 40px; color: rgba(255,255,255,0.2); font-size: 14px; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px 14px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    th { color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 1px; font-weight: 600; white-space: nowrap; }
    td { color: rgba(255,255,255,0.8); }

    .api-table th { text-align: left; }
    .api-table td { text-align: left; }
    .api-table td.count { text-align: right; font-weight: 600; color: #8b7dff; }
    .bar-wrap { display: inline-block; width: 100%; max-width: 200px; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; vertical-align: middle; margin-left: 10px; }
    .bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #6c63ff, #8b7dff); transition: width 0.5s ease; }

    .footer { text-align: center; margin-top: 24px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.2); font-size: 12px; line-height: 1.8; }
    .footer a { color: rgba(108,99,255,0.5); text-decoration: none; transition: color 0.2s; }
    .footer a:hover { color: rgba(108,99,255,0.8); }
    .footer .section-title { color: rgba(255,255,255,0.3); font-size: 11px; margin-bottom: 4px; letter-spacing: 1px; }

    @media (max-width: 600px) {
      .metrics-row { grid-template-columns: repeat(2, 1fr); }
      .metric-value { font-size: 22px; }
    }
  </style>
</head>
<body>
<div id="header"><div class="navbar"><span class="brand">🌐 IPQuery</span></div></div>
<div class="container">
  <h1 data-i18n="stats.title">📊 网站统计</h1>
  <div class="subtitle" data-i18n="stats.subtitle">页面访问量 & API 调用次数</div>

  <div class="metrics-row">
    <div class="metric-card pv">
      <div class="metric-value" id="todayPV">-</div>
      <div class="metric-label" data-i18n="stats.todayPV">今日 PV</div>
    </div>
    <div class="metric-card api">
      <div class="metric-value" id="todayAPI">-</div>
      <div class="metric-label" data-i18n="stats.todayAPI">今日 API 调用</div>
    </div>
    <div class="metric-card pv">
      <div class="metric-value" id="totalPV">-</div>
      <div class="metric-label" data-i18n="stats.totalPV">总计 PV</div>
    </div>
    <div class="metric-card api">
      <div class="metric-value" id="totalAPI">-</div>
      <div class="metric-label" data-i18n="stats.totalAPI">总计 API 调用</div>
    </div>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" data-range="daily" data-i18n="stats.tabToday">今日</button>
    <button class="tab-btn" data-range="weekly" data-i18n="stats.tab7Days">7 天</button>
    <button class="tab-btn" data-range="monthly" data-i18n="stats.tab30Days">30 天</button>
    <button class="tab-btn" data-range="yearly" data-i18n="stats.tab1Year">1 年</button>
  </div>

  <div class="card">
    <div class="card-title" id="chartTitle" data-i18n="stats.clickTabHint">📅 点击上方标签查看数据</div>
    <div class="empty" id="placeholder" style="display:block;" data-i18n="stats.clickToLoad">👆 点击「今日」「7天」「30天」「1年」加载数据</div>
    <div class="loading" id="loading" style="display:none" data-i18n="stats.loading">加载中...</div>
    <div class="empty" id="empty" style="display:none" data-i18n="stats.noData">暂无数据</div>
    <div class="daily-info" id="dailyInfo" style="display:none">
      <div style="text-align:center;padding:10px 0 20px;">
        <div style="font-size:16px;color:rgba(255,255,255,0.5);" id="dailyDate"></div>
        <div style="display:flex;justify-content:center;gap:40px;margin-top:16px;flex-wrap:wrap;">
          <div style="text-align:center;">
            <div style="font-size:36px;font-weight:700;color:#8b7dff;" id="dailyPV"></div>
            <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px;">页面访问 PV</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:36px;font-weight:700;color:#00c896;" id="dailyAPICount"></div>
            <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px;">API 调用</div>
          </div>
        </div>
      </div>
    </div>
    <div class="chart-wrap" id="chartWrap" style="display:none">
      <canvas id="statsChart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-title" data-i18n="stats.chartAPIRank">🔌 API 接口排行</div>
    <div class="table-wrap" id="apiTable"></div>
  </div>

  <div id="footer"></div>
</div>

<script>
// ── 组件加载 ──
(function(){
  var siteUrl = document.querySelector('meta[name="site-url"]')?.content || location.origin;
  var canonical = document.querySelector('link[rel="canonical"]');
  if (canonical) canonical.href = siteUrl + location.pathname;

  var path = location.pathname;
  var activeNav = 'home';
  if (path.indexOf('api-docs') !== -1) activeNav = 'docs';
  else if (path.indexOf('api-recommend') !== -1) activeNav = 'recommend';
  else if (path.indexOf('stats') !== -1) activeNav = 'stats';

  fetch('/components/header.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      document.getElementById('header').innerHTML = html;
      var link = document.querySelector('.navbar a[data-nav="'+activeNav+'"]');
      if (link) link.className = 'active';
    });

  fetch('/components/footer.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      document.getElementById('footer').innerHTML = html;
    });
})();

function $(id){ return document.getElementById(id); }
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ── Chart.js 暗色主题 ──
var darkTheme = {
  fontColor: 'rgba(255,255,255,0.4)',
  gridColor: 'rgba(255,255,255,0.06)',
  pvColor: '#8b7dff',
  pvBgColor: 'rgba(139,125,255,0.1)',
  apiColor: '#00c896',
  apiBgColor: 'rgba(0,200,150,0.3)'
};

var chart = null;
var currentRange = 'daily';

// ── Tab 切换 ──
var tabs = document.querySelectorAll('.tab-btn');
tabs.forEach(function(btn){
  btn.addEventListener('click', function(){
    tabs.forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentRange = btn.getAttribute('data-range');
    loadStats();
  });
});

async function loadStats(){
  $('placeholder').style.display = 'none';
  $('loading').style.display = 'block';
  $('empty').style.display = 'none';
  $('dailyInfo').style.display = 'none';
  $('chartWrap').style.display = 'none';
  if (chart) { chart.destroy(); chart = null; }

  try {
    var resp = await fetch('/api/stats?range=' + currentRange);
    var data = await resp.json();
    if (!data.success) { $('loading').style.display = 'none'; $('empty').style.display = 'block'; return; }

    var daily = data.daily;

    // 更新指标卡片
    var today = daily[daily.length - 1];
    $('todayPV').textContent = today ? today.pageviews : '0';
    $('todayAPI').textContent = today ? today.api_calls : '0';
    $('totalPV').textContent = data.total_pv;
    $('totalAPI').textContent = data.total_api;

    // 构建图表数据
    var labels = [], pvValues = [], apiValues = [];

    if (currentRange === 'yearly') {
      // 按月聚合
      var monthly = {};
      daily.forEach(function(d){
        var m = d.date.substring(0, 7);
        if (!monthly[m]) monthly[m] = { pv: 0, api: 0 };
        monthly[m].pv += d.pageviews;
        monthly[m].api += d.api_calls;
      });
      labels = Object.keys(monthly);
      pvValues = labels.map(function(m){ return monthly[m].pv; });
      apiValues = labels.map(function(m){ return monthly[m].api; });
      $('chartTitle').textContent = '📅 月度统计';
    } else {
      labels = daily.map(function(d){ return d.date; });
      pvValues = daily.map(function(d){ return d.pageviews; });
      apiValues = daily.map(function(d){ return d.api_calls; });
      $('chartTitle').textContent = '📅 每日明细';
    }

    var hasData = pvValues.some(function(v){ return v > 0; }) || apiValues.some(function(v){ return v > 0; });

    $('loading').style.display = 'none';

    if (!hasData) {
      $('empty').style.display = 'block';
      return;
    }

    if (currentRange === 'daily') {
      // 今日：直接显示数据，不用图表
      $('chartTitle').textContent = '📅 今日数据';
      $('dailyInfo').style.display = 'block';
      $('dailyDate').textContent = '日期: ' + labels[0];
      $('dailyPV').textContent = pvValues[0];
      $('dailyAPICount').textContent = apiValues[0];
    } else {
      $('chartWrap').style.display = 'block';
      renderChart(labels, pvValues, apiValues);
    }

    // API 排行表
    var breakdown = data.api_breakdown;
    var entries = Object.entries(breakdown).sort(function(a,b){ return b[1] - a[1]; });
    if (entries.length === 0) {
      $('apiTable').innerHTML = '<div class="empty" style="display:block">暂无 API 调用记录</div>';
    } else {
      var maxVal = entries[0][1] || 1;
      var h = '<table class="api-table"><thead><tr><th>接口</th><th style="text-align:right;">调用次数</th></tr></thead><tbody>';
      entries.forEach(function(e){
        var pct = Math.round(e[1] / maxVal * 100);
        h += '<tr>' +
          '<td><a href="/api/' + esc(e[0]) + '" target="_blank" style="color:#8b7dff;text-decoration:none;font-size:13px;">/api/' + esc(e[0]) + '</a>' +
          '<span class="bar-wrap"><span class="bar-fill" style="width:' + pct + '%"></span></span></td>' +
          '<td class="count">' + e[1] + '</td>' +
          '</tr>';
      });
      h += '</tbody></table>';
      $('apiTable').innerHTML = h;
    }
  } catch(e){
    $('loading').style.display = 'none';
    $('empty').textContent = '加载失败: ' + e.message;
    $('empty').style.display = 'block';
  }
}

function renderChart(labels, pvData, apiData){
  var ctx = $('statsChart').getContext('2d');

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'API 调用',
          data: apiData,
          backgroundColor: darkTheme.apiBgColor,
          borderColor: darkTheme.apiColor,
          borderWidth: 1,
          borderRadius: 3,
          order: 2,
          yAxisID: 'y1'
        },
        {
          label: 'PV',
          data: pvData,
          type: 'line',
          borderColor: darkTheme.pvColor,
          backgroundColor: darkTheme.pvBgColor,
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          pointBackgroundColor: darkTheme.pvColor,
          order: 1,
          yAxisID: 'y'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {
        mode: 'index',
        intersect: false
      },
      plugins: {
        legend: {
          labels: {
            color: darkTheme.fontColor,
            usePointStyle: true,
            padding: 20,
            font: { size: 13 }
          }
        },
        tooltip: {
          backgroundColor: 'rgba(15,12,41,0.95)',
          titleColor: '#fff',
          bodyColor: 'rgba(255,255,255,0.8)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1
        }
      },
      scales: {
        x: {
          ticks: {
            color: darkTheme.fontColor,
            maxRotation: 45,
            font: { size: 11 }
          },
          grid: { color: darkTheme.gridColor }
        },
        y: {
          type: 'linear',
          display: true,
          position: 'left',
          title: {
            display: true,
            text: 'PV',
            color: darkTheme.pvColor
          },
          ticks: { color: darkTheme.fontColor },
          grid: { color: darkTheme.gridColor },
          beginAtZero: true
        },
        y1: {
          type: 'linear',
          display: true,
          position: 'right',
          title: {
            display: true,
            text: 'API',
            color: darkTheme.apiColor
          },
          ticks: { color: darkTheme.fontColor },
          grid: { drawOnChartArea: false },
          beginAtZero: true
        }
      }
    }
  });
}

// 自动加载今日数据
loadStats();
</script>
</body>
</html>
