    .subtitle { text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 28px; }

    .search-box { display: flex; gap: 10px; margin-bottom: 14px; }
    .search-box input {
      flex: 1; min-width: 0; padding: 14px 18px; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;

    .error-card { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.2); border-radius: 14px; padding: 20px; display: none; color: #ff6b6b; text-align: center; word-break: break-all; }

    @media (max-width: 520px) {

      .main-card { padding: 20px 16px; border-radius: 16px; }

      .search-box { flex-direction: column; }

      .ip-entry-detail { padding: 10px 12px 6px; }
    }
  </style>

<script type="application/ld+json" id="site-ldjson"></script>

<script src="/classifier.js"></script>
<script>
// 从 meta 标签读取网站域名，设置 canonical 和 JSON-LD
(function(){
  var siteUrl = document.querySelector('meta[name="site-url"]')?.content || location.origin;
  var canonical = document.querySelector('link[rel="canonical"]');
  if (canonical) canonical.href = siteUrl + '/';
  // JSON-LD
  var ld = document.getElementById('site-ldjson');
  if (ld) ld.textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "IP归属地查询",
    "url": siteUrl + '/',
    "description": "在线IP归属地查询工具，支持IPv4和IPv6地址查询、域名解析、本机公网IP获取。基于纯真IP数据库。",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "All",
    "browserRequirements": "Requires JavaScript",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "CNY" }
  });
})();

const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('keypress', e => { if (e.key === 'Enter') search(); });

function searchBy(text) { searchInput.value = text; search(); }
function qs(id) { return document.getElementById(id); }
function __t(key) { return (window.I18N && window.I18N.t ? window.I18N.t(key) : null) || key; }

function showLoading() {
  qs('loading').classList.add('show');
  qs('resultCard').classList.remove('show');
  qs('errorCard').classList.remove('show');
  qs('searchBtn').disabled = true;
}
function hideLoading() { qs('loading').classList.remove('show'); qs('searchBtn').disabled = false; }
function showError(msg) { hideLoading(); qs('errorCard').textContent = '❌ ' + msg; qs('errorCard').classList.add('show'); }
function setVal(id, val) {
  const el = qs(id);
  el.textContent = val || '-';
  el.className = 'result-value' + ((!val || val === '-') ? ' empty' : '');
}
function escHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

async function queryMyIP() {
  showLoading();
  try {
    const r = await fetch('/api/myip');
    const d = await r.json();
    if (d.success && d.ip) { searchInput.value = d.ip; await search(); }
    else { showError(__t('home.getIPFailed')); }
  } catch (e) { showError(__t('home.getIPFailed') + ': ' + e.message); }
}

// 简单 LRU 缓存 — 避免重复查询同 IP
const resultCache = new Map();
const CACHE_MAX = 50;
async function search() {
  const q = searchInput.value.trim();
  if (!q) return;
  showLoading();
  // 检查缓存
  const cached = resultCache.get(q);
  if (cached) {
    hideLoading();
    displayResult(cached);
    return;
  }
  try {
    const resp = await fetch('/api/query?q=' + encodeURIComponent(q));
    const data = await resp.json();
    hideLoading();
    if (data.success) { 
      // 写入缓存
      if (resultCache.size >= CACHE_MAX) {
        const firstKey = resultCache.keys().next().value;
        resultCache.delete(firstKey);
      }
      resultCache.set(q, data);
      displayResult(data); 
    }
    else { showError(data.error || __t('home.noResult')); }
  } catch (e) { showError(__t('home.networkError') + ': ' + e.message); }
}

// classifyFields 结果缓存 — 每个 (region,isp,owner,country) 元组只算一次
const classifyCache = new Map();
function classifyFieldsCached(region, isp, owner, country) {
  const key = region + '|' + isp + '|' + owner + '|' + country;
  if (classifyCache.has(key)) return classifyCache.get(key);
  const result = classifyFields(region, isp, owner, country);
  classifyCache.set(key, result);
  return result;
}

function displayResult(data) {
  // 清空分类缓存（每次查询刷新）
  classifyCache.clear();
  qs('resultIp').textContent = data.ip;
  qs('resultInput').textContent = __t('home.queryLabel') + ': ' + (data.input || '');

  const badge = qs('resultBadge');
  if (data.type === 'IPv4 + IPv6') { badge.textContent = 'IPv4 + IPv6'; badge.className = 'badge badge-dual'; }
  else { badge.textContent = data.type; badge.className = 'badge ' + (data.type === 'IPv6' ? 'badge-ipv6' : 'badge-ipv4'); }

  // 有双主卡片（v4+v6）时隐藏主详情网格，用双卡片展示
  let hasDual = !!(data.primary_v4 && data.primary_v6);
  qs('mainResultGrid').style.display = hasDual ? 'none' : 'grid';

  if (!hasDual) {
    // 单 IP 时主网格显示 primary 信息
    // 智能分类：纯真库的 region 字段可能混用省份名、运营商名或公司名
    const { province, ispClean, ownerClean, countryCity } = classifyFieldsCached(data.region, data.isp, data.owner, data.country);
    setVal('rCountry', data.country.split(/[–-]/)[0] || data.country); // 去掉 "中国–广东" 中的多余部分
    setVal('rRegion', province);
    setVal('rCity', countryCity || data.city);
    setVal('rDistrict', data.district);
    setVal('rISP', ispClean);
    setVal('rOwner', ownerClean);
    setVal('rType', data.type + (data.country_code ? ' (' + data.country_code + ')' : ''));
    setVal('rBitmask', data.bitmask ? '/' + data.bitmask : '-');
  }

  // 双主卡片（primary_v4 + primary_v6）
  const dualArea = qs('dualPrimaryArea');
  const dualContainer = qs('dualPrimaryContainer');
  dualContainer.innerHTML = '';
  if (data.primary_v4 && data.primary_v6) {
    hasDual = true;
    [data.primary_v4, data.primary_v6].forEach((p, i) => {
      const typeLabel = i === 0 ? 'IPv4' : 'IPv6';
      const card = document.createElement('div');
      card.className = 'primary-card';
      card.innerHTML =
        '<div class="primary-card-title" style="color:' + (i === 0 ? '#8b7dff' : '#00c896') + ';">🌐 ' + typeLabel + '</div>' +
        '<div class="primary-card-ip">' + escHtml(p.ip) + '</div>' +
        '<div class="primary-card-loc">' + escHtml(p.location || '未知') + '</div>' +
        (p.isp ? '<div class="primary-card-loc" style="margin-top:2px;">🏢 ' + escHtml(p.isp) + '</div>' : '') +
        (p.country_code ? '<div class="primary-card-loc" style="margin-top:2px;color:rgba(255,255,255,0.35);font-size:11px;">' + escHtml(p.country_code) + (p.bitmask ? ' /' + p.bitmask : '') + '</div>' : '');
      dualContainer.appendChild(card);
    });
  } else if (data.primary_v4 && !data.primary_v6) {
    // 只有 v4
    if (data.results && data.results.length > 1) {
      // 有多个v4但没v6，不显示双卡片
    }
  } else if (data.primary_v6 && !data.primary_v4) {
    // 只有 v6
  }
  dualArea.style.display = hasDual ? 'block' : 'none';

  // 多 IP 列表（除默认显示的 v4 和 v6 以外的）
  const multiSection = qs('multiIpSection');
  const listEl = qs('multiIpList');
  if (data.results && data.results.length > 1) {
    // 过滤掉已经在主卡片中显示的 IP
    const shownIps = new Set();
    if (data.primary_v4) shownIps.add(data.primary_v4.ip);
    if (data.primary_v6) shownIps.add(data.primary_v6.ip);
    
    const extraResults = data.results.filter(r => !shownIps.has(r.ip));
    
    if (extraResults.length > 0) {
      // 使用 DocumentFragment 批量追加，减少 DOM 重排
      const fragment = document.createDocumentFragment();
      extraResults.forEach((item, idx) => {
        const realIdx = data.results.indexOf(item);
        // 预缓存分类结果
        const classified = classifyFieldsCached(item.region, item.isp, item.owner, item.country);

        const entry = document.createElement('div');
        entry.className = 'ip-entry';
        entry.setAttribute('data-idx', realIdx);
        const badgeColor = item.type === 'IPv6' ? 'badge-ipv6' : 'badge-ipv4';
        entry.innerHTML =
          '<span class="ip-entry-badge ' + badgeColor + '">' + item.type + '</span>' +
          '<span class="ip-entry-addr">' + escHtml(item.ip) + '</span>' +
          '<span class="ip-entry-loc">' + escHtml(item.location || '未知') + '</span>' +
          '<span class="arrow">▶</span>';
        entry.addEventListener('click', () => toggleDetail(realIdx, entry));
        fragment.appendChild(entry);

        const detail = document.createElement('div');
        detail.className = 'ip-entry-detail';
        detail.id = 'detail-' + realIdx;
        detail.innerHTML =
          '<div class="detail-item"><div class="detail-label">' + __t('home.resultCountry') + '</div><div class="detail-value">' + escHtml((item.country || '').split(/[–-]/)[0] || item.country || '-') + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">' + __t('home.resultRegion') + '</div><div class="detail-value">' + escHtml(classified.province || '-') + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">' + __t('home.resultCity') + '</div><div class="detail-value">' + escHtml(classified.countryCity || item.city || '-') + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">' + __t('home.resultDistrict') + '</div><div class="detail-value">' + escHtml(item.district || '-') + '</div></div>' +
          '<div class="detail-item full"><div class="detail-label">' + __t('home.resultISP') + '</div><div class="detail-value">' + escHtml(classified.ispClean || '-') + '</div></div>' +
          '<div class="detail-item"><div class="detail-label">' + __t('home.resultType') + '</div><div class="detail-value">' + item.type + '</div></div>';
        fragment.appendChild(detail);
      });
      listEl.innerHTML = '';
      listEl.appendChild(fragment);
      multiSection.style.display = 'block';
    } else {
      multiSection.style.display = 'none';
    }
  } else {
    multiSection.style.display = 'none';
  }

  qs('resultCard').classList.add('show');
}

let activeDetailIdx = -1;
function toggleDetail(idx, entryEl) {
  const detail = qs('detail-' + idx);
  if (!detail) return;
  if (activeDetailIdx === idx) {
    detail.classList.remove('show');
    entryEl.classList.remove('open');
    activeDetailIdx = -1;
  } else {
    if (activeDetailIdx >= 0) {
      const prev = qs('detail-' + activeDetailIdx);
      const prevEntry = document.querySelector('.ip-entry[data-idx="' + activeDetailIdx + '"]');
      if (prev) prev.classList.remove('show');
      if (prevEntry) prevEntry.classList.remove('open');
    }
    detail.classList.add('show');
    entryEl.classList.add('open');
    activeDetailIdx = idx;
  }
}
</script>
<script>
(function(){
  var path = location.pathname;
  var activeNav = 'home';
  if (path.indexOf('api-docs') !== -1) activeNav = 'docs';
  else if (path.indexOf('api-recommend') !== -1) activeNav = 'recommend';
  else if (path.indexOf('stats') !== -1) activeNav = 'stats';

  fetch('/components/header.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      document.getElementById('header').innerHTML = html;
      var link = document.querySelector('.navbar a[data-nav="'+activeNav+'"]');
      if (link) link.className = 'active';
    });

  fetch('/components/footer.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      var container = document.getElementById('footer');
      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      var scripts = tmp.querySelectorAll('script');
      scripts.forEach(function(s){
        var ns = document.createElement('script');
        if (s.src) ns.src = s.src;
        ns.textContent = s.textContent;
        document.body.appendChild(ns);
        s.remove();
      });
      container.innerHTML = tmp.innerHTML;
      if (window.I18N) I18N.applyAll();
    });
})();
</script>
</body>
</html>
