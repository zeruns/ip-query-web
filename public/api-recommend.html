<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>IP查询API推荐 - 多源IP信息对比 | IP归属地查询</title>
  <meta name="description" content="国内外主流IP查询API服务推荐列表，包含ipinfo.io、ip-api.com、ip.sb等，支持IPv4/IPv6地理位置查询，供开发者对比选择。">
  <meta name="keywords" content="IP查询API推荐,ipinfo,ip-api,ip.sb,IP地理位置API,免费IP查询">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="">
  <meta name="site-url" content="https://ip-query.zeruns.com">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <script src="/tracking.js"></script>
  <script src="/i18n.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #e0e0e0;
      padding-top: 60px;
    }
    .navbar {
      position: fixed; top:0; left:0; right:0; z-index:100;
      background: rgba(15,12,41,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .navbar a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .navbar a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .navbar a.active { color: #8b7dff; background: rgba(108,99,255,0.12); font-weight: 600; }
    .navbar .brand { color: #8b7dff; font-weight: 700; font-size: 15px; margin-right: 12px; }

    .container { max-width: 860px; margin: 0 auto; padding: 20px 16px 40px; }
    .main-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }
    h1 {
      font-size: 22px;
      margin-bottom: 6px;
      text-align: center;
      background: linear-gradient(90deg, #6c63ff, #b388ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 24px; }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .search-box input {
      flex: 1; min-width: 0;
      padding: 14px 18px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
    }
    .search-box input:focus { border-color: #6c63ff; background: rgba(255,255,255,0.12); box-shadow: 0 0 20px rgba(108,99,255,0.15); }
    .search-box input::placeholder { color: rgba(255,255,255,0.35); }
    .search-box button, .btn-query {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #6c63ff, #8b7dff);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .search-box button:hover, .btn-query:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,99,255,0.3); }
    .search-box button:disabled, .btn-query:disabled { opacity:0.6; cursor:not-allowed; transform:none; box-shadow:none; }
    .btn-secondary {
      padding: 10px 18px;
      border: 1px solid rgba(108,99,255,0.4);
      border-radius: 10px;
      background: transparent;
      color: #8b7dff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-secondary:hover { background: rgba(108,99,255,0.12); }
    .btn-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }

    .api-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 24px;
    }
    .api-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 18px;
      transition: all 0.2s;
    }
    .api-card:hover { border-color: rgba(108,99,255,0.2); }
    .api-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .api-card-name {
      font-size: 14px;
      font-weight: 600;
      color: #8b7dff;
    }
    .api-card-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 8px;
    }
    .status-loading { background: rgba(255,180,50,0.15); color: #ffb432; }
    .status-success { background: rgba(0,200,150,0.15); color: #00c896; }
    .status-error { background: rgba(255,50,50,0.15); color: #ff6b6b; }
    .status-idle { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.3); }

    .api-card-body { font-size: 13px; line-height: 1.8; }
    .api-card-body .row { display: flex; padding: 2px 0; }
    .api-card-body .label { color: rgba(255,255,255,0.35); width: 56px; flex-shrink: 0; }
    .api-card-body .value { color: rgba(255,255,255,0.85); word-break: break-all; }
    .api-card-body .value.empty { color: rgba(255,255,255,0.2); font-style: italic; }
    .api-card-error { color: #ff6b6b; font-size: 12px; margin-top: 6px; }
    .api-card-doc { color: rgba(255,255,255,0.4); font-size: 12px; line-height: 1.6; padding: 6px 0; }
    .api-card-link { margin-top: 8px; }
    .api-card-link a { color: #8b7dff; font-size: 12px; text-decoration: none; }
    .api-card-link a:hover { text-decoration: underline; }

    .loading-overlay { text-align: center; padding: 24px; display: none; }
    .loading-overlay.show { display: block; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top: 3px solid #6c63ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.2);
      font-size: 12px;
      line-height: 1.8;
    }
    .footer a { color: rgba(108,99,255,0.5); text-decoration: none; transition: color 0.2s; }
    .footer a:hover { color: rgba(108,99,255,0.8); }
    .footer .section-title { color: rgba(255,255,255,0.3); font-size: 11px; margin-bottom: 4px; letter-spacing: 1px; }

    @media (max-width: 640px) {
      body { padding-top: 50px; }
      .navbar { height: 48px; padding: 0 8px; gap: 2px; white-space: nowrap; overflow-x: auto; justify-content: flex-start; }
      .navbar .brand { display: none; }
      .navbar a { padding: 5px 10px; font-size: 12px; }
      .main-card { padding: 20px 16px; border-radius: 16px; }
      h1 { font-size: 19px; }
      .search-box { flex-direction: column; }
      .search-box button { width: 100%; }
      .btn-row { justify-content: center; }
      .api-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="header"><div class="navbar"><span class="brand">🌐 IPQuery</span></div></div>
<div class="container">
  <div class="main-card">
    <h1 data-i18n="apiRecommend.title">🔗 第三方 IP 查询 API 推荐</h1>
    <div class="subtitle" data-i18n="apiRecommend.subtitle">多源对比查询，浏览器端直接调用各 API 获取 IP 信息</div>

    <div class="search-box">
      <input type="text" id="ipInput" data-i18n-placeholder="apiRecommend.ipPlaceholder" placeholder="输入IP地址，留空则查询自己的IP">
      <button onclick="startQuery()" data-i18n="apiRecommend.queryBtn">🚀 开始查询</button>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="querySelf()" data-i18n="apiRecommend.queryMyIP">📍 查询我的IP</button>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div style="color: rgba(255,255,255,0.5); font-size: 13px;" data-i18n="apiRecommend.loading">正在从各 API 获取数据...</div>
    </div>

    <div class="api-grid" id="apiGrid"></div>
  </div>

  <div id="footer"></div>
</div>

<script>
const API_SOURCES = [
  {
    id: 'ipip',
    name: 'IPIP.NET',
    selfOnly: true,
    url: () => `https://myip.ipip.net`,
    parse: d => {
      // 返回纯文本：当前 IP：110.42.101.53  来自于：中国 浙江 宁波  电信
      const text = typeof d === 'string' ? d : '';
      const ipm = text.match(/IP[：:]\s*([\d.:a-fA-F]+)/);
      const locm = text.match(/来自于[：:]\s*(.+)/);
      if (!locm) return { ip: ipm ? ipm[1] : '', location: text.trim() };
      const parts = locm[1].trim().split(/\s+/);
      const country = parts[0] || '';
      const region = parts[1] || '';
      const city = parts[2] || '';
      const isp = parts.slice(3).join(' ') || '';
      return { ip: ipm ? ipm[1] : '', country, region, city, isp, timezone: '' };
    },
    link: 'https://www.ipip.net/',
    doc: 'IPIP.NET 商业 IP 数据库厂商提供的免费查询接口，无需注册，返回纯文本（当前 IP + 地理位置）。仅支持查询访问者自身 IP，不支持查询指定 IP 地址。2024年新增限制需传 UA Header。'
  },
  {
    id: 'ip-api',
    name: 'ip-api.com',
    url: ip => ip ? `/api/recommend/ip-api?q=${ip}` : `/api/recommend/ip-api`,
    parse: d => ({
      ip: d.query, country: d.country, region: d.regionName, city: d.city,
      isp: d.isp, org: d.org, lat: d.lat, lon: d.lon, timezone: d.timezone
    }),
    link: 'https://ip-api.com/',
    doc: '无需注册，免费调用。限制：45次/分钟。免费版仅支持 HTTP，本站通过服务端代理实现查询（不暴露服务器公网 IP）。返回 JSON/XML/CSV 格式。'
  },
  {
    id: 'ip-sb',
    name: 'ip.sb',
    url: ip => ip ? `https://api.ip.sb/geoip/${ip}` : `https://api.ip.sb/geoip`,
    parse: d => ({
      ip: d.ip, country: d.country, region: d.region, city: d.city,
      isp: d.isp, org: d.organization, lat: d.latitude, lon: d.longitude, timezone: d.timezone
    }),
    link: 'https://ip.sb/',
    doc: '无需注册，无明确频率限制。支持 IPv4/IPv6。返回 JSON 格式。国内访问可用。'
  },
  {
    id: 'geojsio',
    name: 'geojs.io',
    url: ip => ip ? `https://get.geojs.io/v1/ip/geo/${ip}.json` : `https://get.geojs.io/v1/ip/geo.json`,
    parse: d => ({
      ip: d.ip, country: d.country, region: d.region, city: d.city,
      isp: d.organization_name, org: d.organization, lat: d.latitude, lon: d.longitude, timezone: d.timezone
    }),
    link: 'https://www.geojs.io/',
    doc: '免费，无需注册，无明确频率限制。返回 JSON/JSONP 格式，含 ASN/坐标/时区/大洲。支持 IPv4/IPv6。'
  },
  {
    id: 'ipapi-is',
    name: 'ipapi.is',
    url: ip => `https://api.ipapi.is/?q=${ip || ''}`,
    parse: d => ({
      ip: d.ip,
      country: d.location?.country || '',
      region: d.location?.state || '',
      city: d.location?.city || '',
      isp: d.company?.name || '',
      org: d.asn?.org || '',
      lat: d.location?.latitude, lon: d.location?.longitude,
      timezone: d.location?.timezone || ''
    }),
    link: 'https://ipapi.is/',
    doc: '免费 HTTPS 接口，无明确频率限制。返回 JSON 格式，含详细地理位置/ISP/ASN/安全检测（代理/VPN/TOR）。支持 IPv4/IPv6。'
  },
  {
    id: 'iplocate-io',
    name: 'iplocate.io',
    url: ip => ip ? `https://www.iplocate.io/api/lookup/${ip}` : `https://www.iplocate.io/api/lookup/`,
    parse: d => ({
      ip: d.ip, country: d.country, region: d.subdivision, city: d.city,
      isp: d.asn?.name, org: '', lat: d.latitude, lon: d.longitude, timezone: d.time_zone
    }),
    link: 'https://www.iplocate.io/',
    doc: '免费 HTTPS 接口，无需注册。返回 JSON 格式，含详细地理位置/ASN/坐标/时区/隐私检测。支持 IPv4/IPv6。'
  },
  {
    id: 'freeipapi',
    name: 'freeipapi.com',
    url: ip => ip ? `https://free.freeipapi.com/api/json/${ip}` : `https://free.freeipapi.com/api/json`,
    parse: d => ({
      ip: d.ipAddress, country: d.countryName, region: d.regionName, city: d.cityName,
      isp: d.isp, org: d.organization, lat: d.latitude, lon: d.longitude, timezone: (d.timeZones || [])[0] || ''
    }),
    link: 'https://freeipapi.com/',
    doc: '免费 HTTPS 接口，无需注册，限制 60次/分钟。返回 JSON 格式，含国家/城市/ISP/坐标/时区/ASN。支持 IPv4/IPv6。'
  },
  {
    id: 'ipinfo',
    name: 'ipinfo.io',
    url: ip => ip ? `https://ipinfo.io/${ip}/json` : `https://ipinfo.io/json`,
    parse: d => ({
      ip: d.ip, country: d.country, region: d.region, city: d.city,
      isp: d.org, org: d.org, lat: d.loc ? d.loc.split(',')[0] : null,
      lon: d.loc ? d.loc.split(',')[1] : null, timezone: d.timezone
    }),
    link: 'https://ipinfo.io/',
    doc: '免费用户每日 50,000 次。需注册 Token（可选）。返回详细地理/ASN/运营商信息，含坐标和时区。'
  }
];

let currentIP = '';

function qs(id) { return document.getElementById(id); }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function __t(key) { return (window.I18N && window.I18N.t ? window.I18N.t(key) : null) || key; }

function initGrid() {
  const grid = qs('apiGrid');
  grid.innerHTML = '';
  API_SOURCES.forEach(src => {
    const card = document.createElement('div');
    card.className = 'api-card';
    card.id = 'card-' + src.id;
    card.innerHTML =
      '<div class="api-card-header">' +
        '<span class="api-card-name">' + esc(src.name) + '</span>' +
        '<span class="api-card-status status-idle" data-i18n="apiRecommend.pending" id="status-' + src.id + '">待查询</span>' +
      '</div>' +
      '<div class="api-card-body" id="body-' + src.id + '">' +
        '<div class="api-card-doc">📖 <span data-i18n="apiDesc.' + src.id + '">' + esc((window.I18N && I18N.t('apiDesc.' + src.id)) || src.doc) + '</span></div>' +
        '<div class="api-card-link"><a href="' + esc(src.link) + '" target="_blank" rel="noopener" data-i18n="apiRecommend.visitSite">🔗 访问官网</a></div>' +
      '</div>';
    grid.appendChild(card);
  });
}

function setStatus(id, status, text) {
  const el = qs('status-' + id);
  el.textContent = text;
  el.className = 'api-card-status status-' + status;
}

function renderResult(srcId, data) {
  const body = qs('body-' + srcId);
  if (!data) {
    body.innerHTML = '<div class="api-card-error">❌ ' + __t('apiRecommend.noData') + '</div>';
    return;
  }
  const fields = [
    { label: 'IP', val: data.ip },
    { label: '国家', val: data.country },
    { label: '地区', val: data.region },
    { label: '城市', val: data.city },
    { label: '区县', val: data.district },
    { label: 'ISP', val: data.isp },
    { label: '组织', val: data.org },
    { label: '坐标', val: data.lat && data.lon ? data.lat + ', ' + data.lon : null },
    { label: '时区', val: data.timezone }
  ];
  body.innerHTML = fields.map(f =>
    '<div class="row"><span class="label">' + f.label + '</span><span class="value' + (!f.val ? ' empty' : '') + '">' + esc(f.val || '-') + '</span></div>'
  ).join('');
}

function renderError(srcId, errMsg) {
  const body = qs('body-' + srcId);
  body.innerHTML = '<div class="api-card-error">❌ ' + esc(errMsg) + '</div>';
}

async function querySingleAPI(src) {
  // 若用户提供了 IP 但该 API 仅支持查询自身 IP，直接提示
  if (currentIP && src.selfOnly) {
    setStatus(src.id, 'error', '❌ ' + __t('apiRecommend.fail'));
    renderError(src.id, __t('apiRecommend.selfOnlyError'));
    return;
  }
  // 若当前页面为 HTTPS 但该 API 仅支持 HTTP，直接提示
  if (src.httpOnly && location.protocol === 'https:') {
    setStatus(src.id, 'error', '❌ ' + __t('apiRecommend.fail'));
    renderError(src.id, __t('apiRecommend.httpOnlyError'));
    return;
  }
  setStatus(src.id, 'loading', __t('apiRecommend.loading'));
  try {
    const url = src.url(currentIP);
    const resp = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    // 安全 JSON 解析：有些 API 返回非标准 JSON
    const text = await resp.text();
    let data;
    let parsed;
    try {
      data = JSON.parse(text);
      parsed = src.parse(data);
    } catch (e) {
      // JSON 解析失败，可能是纯文本格式（如 myip.la），直接传 text 给 parse
      parsed = src.parse(text);
    }
    if (!parsed || (!parsed.ip && !parsed.country)) {
      throw new Error('无法解析响应数据');
    }
    setStatus(src.id, 'success', '✅ ' + __t('apiRecommend.success'));
    renderResult(src.id, parsed);
  } catch (e) {
    let friendlyMsg = e.message;
    if (e.name === 'TimeoutError' || e.name === 'AbortError') {
      friendlyMsg = '请求超时（该 API 在你所在的网络可能被屏蔽或访问缓慢）';
    } else if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
      friendlyMsg = '网络请求失败（该 API 可能被防火墙屏蔽或不支持 HTTPS）';
    } else if (e.message.includes('HTTP 429')) {
      friendlyMsg = '请求频率过高，已被限流，请稍后再试';
    } else if (e.message.includes('HTTP 403') || e.message.includes('HTTP 401')) {
      friendlyMsg = 'API 访问被拒绝，可能需要注册 Token';
    } else if (e.message.includes('HTTP 404')) {
      friendlyMsg = '该 IP 在此 API 中未找到对应信息';
    } else if (e.message.includes('HTTP 5')) {
      friendlyMsg = 'API 服务端异常，请稍后再试';
    }
    setStatus(src.id, 'error', '❌ ' + __t('apiRecommend.fail'));
    renderError(src.id, friendlyMsg);
  }
}

async function startQuery() {
  const ip = qs('ipInput').value.trim();
  currentIP = ip || '';
  qs('loadingOverlay').classList.add('show');

  // 如果用户没填 IP，外部 API 传空字符串让浏览器端自检测
  // 不依赖服务端 /api/myip（Tailscale 下会返回服务器 IP）

  initGrid();
  // 并行查所有 API
  await Promise.all(API_SOURCES.map(src => querySingleAPI(src)));
  qs('loadingOverlay').classList.remove('show');
}

async function querySelf() {
  // 直接并行调用所有外部 API（不传 IP，让各自自动检测浏览器端 IP）
  currentIP = '';
  qs('ipInput').value = '';
  qs('loadingOverlay').classList.add('show');
  initGrid();
  await Promise.all(API_SOURCES.map(src => querySingleAPI(src)));
  qs('loadingOverlay').classList.remove('show');
}

// 初始化
initGrid();
</script>
<script>
(function(){
  var siteUrl = document.querySelector('meta[name="site-url"]')?.content || location.origin;
  var canonical = document.querySelector('link[rel="canonical"]');
  if (canonical) canonical.href = siteUrl + location.pathname;

  var path = location.pathname;
  var activeNav = 'home';
  if (path.indexOf('api-docs') !== -1) activeNav = 'docs';
  else if (path.indexOf('api-recommend') !== -1) activeNav = 'recommend';
  else if (path.indexOf('stats') !== -1) activeNav = 'stats';

  fetch('/components/header.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      document.getElementById('header').innerHTML = html;
      var link = document.querySelector('.navbar a[data-nav="'+activeNav+'"]');
      if (link) link.className = 'active';
    });

  fetch('/components/footer.html')
    .then(function(r){ return r.text(); })
    .then(function(html){
      var container = document.getElementById('footer');
      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      var scripts = tmp.querySelectorAll('script');
      scripts.forEach(function(s){
        var ns = document.createElement('script');
        if (s.src) ns.src = s.src;
        ns.textContent = s.textContent;
        document.body.appendChild(ns);
        s.remove();
      });
      container.innerHTML = tmp.innerHTML;
      if (window.I18N) I18N.applyAll();
    });
})();
</script>
